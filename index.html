<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Task Manager</h1>
            <button id="dark-mode-toggle" aria-label="Toggle dark mode">
                <span class="toggle-icon">🌙</span>
            </button>
        </div>
    </header>
    <main>
        <section class="add-task">
            <form id="task-form">
                <label for="task-input" class="sr-only">Enter a new task</label>
                <input type="text" id="task-input" placeholder="Enter a new task" required>
                <button type="submit" aria-label="Add task">Add Task</button>
            </form>
        </section>
        <section class="task-list">
            <h2>Your Tasks</h2>
            <div class="filters" role="group" aria-label="Task filters">
                <button type="button" id="filter-all" class="filter-btn active">All</button>
                <button type="button" id="filter-pending" class="filter-btn">Pending</button>
                <button type="button" id="filter-completed" class="filter-btn">Completed</button>
            </div>
            <ul id="tasks" aria-label="List of tasks"></ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
